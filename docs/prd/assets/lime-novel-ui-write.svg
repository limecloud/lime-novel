<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgWrite" x1="0" y1="0" x2="1600" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4EEE4"/>
      <stop offset="1" stop-color="#E9E0D2"/>
    </linearGradient>
  </defs>
  <style>
    .title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1F1D19; }
    .h1 { font: 700 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1F1D19; }
    .h2 { font: 700 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1F1D19; }
    .body { font: 500 13px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #635C52; }
    .small { font: 500 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7A7368; }
    .serif { font: 500 18px "Source Han Serif SC", "Songti SC", serif; fill: #2C2822; }
  </style>

  <rect width="1600" height="960" rx="28" fill="url(#bgWrite)"/>
  <rect x="24" y="24" width="1552" height="912" rx="24" fill="#FBF8F1" stroke="#D9D0C0"/>
  <rect x="24" y="24" width="1552" height="56" rx="24" fill="#F7F2E8"/>
  <text x="56" y="59" class="title">Lime Novel / 写作工作面</text>
  <text x="1084" y="59" class="body">右栏当前展示“对话”视图，用来说明完整 AI 输入框与结构化消息如何共存</text>

  <rect x="44" y="100" width="72" height="816" rx="20" fill="#F2EBDD" stroke="#DDD3C3"/>
  <rect x="56" y="188" width="48" height="48" rx="14" fill="#486A57"/>
  <text x="72" y="218" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#F7F4EE">写</text>

  <rect x="132" y="100" width="272" height="816" rx="22" fill="#F3ECE0" stroke="#DDD3C3"/>
  <text x="160" y="140" class="h1">章节结构</text>
  <rect x="160" y="168" width="216" height="40" rx="14" fill="#486A57"/>
  <text x="214" y="194" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="700" fill="#F7F4EE">+ 新建章节</text>
  <text x="160" y="248" class="h2">第二卷</text>
  <rect x="160" y="264" width="216" height="60" rx="16" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="180" y="292" class="body">第 11 章 玻璃潮声</text>
  <text x="180" y="314" class="small">已完成</text>
  <rect x="160" y="336" width="216" height="74" rx="16" fill="#DCE8DF" stroke="#B7CCBC"/>
  <text x="180" y="366" class="body">第 12 章 潮汐下的门铃</text>
  <text x="180" y="390" class="small">当前编辑中 · 7,860 字</text>
  <rect x="160" y="422" width="216" height="60" rx="16" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="180" y="450" class="body">第 13 章 钟楼钥匙</text>
  <text x="180" y="472" class="small">提纲已建</text>

  <text x="160" y="532" class="h2">本章状态</text>
  <rect x="160" y="548" width="216" height="160" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="180" y="582" class="small">目标：推进钥匙线索</text>
  <text x="180" y="608" class="small">人物风险：钟声反应偏弱</text>
  <text x="180" y="634" class="small">待回收伏笔：潮汐信号</text>
  <text x="180" y="660" class="small">本轮记忆：第 8 / 11 章摘要</text>

  <rect x="428" y="100" width="736" height="816" rx="22" fill="#FFFDF8" stroke="#D9D0C0"/>
  <rect x="456" y="124" width="680" height="48" rx="16" fill="#F7F2E8"/>
  <text x="484" y="154" class="body">视角：林雾 · 场景：钟楼对峙 · 目标：把门铃推进到钥匙出现</text>

  <text x="476" y="226" class="title" style="font-size:28px;">第 12 章 潮汐下的门铃</text>
  <text x="476" y="262" class="body">正文始终占主舞台；右栏负责对话协作、证据回溯和提议应用。</text>

  <text x="476" y="334" class="serif">雨从港区的高架桥底滑下来，像一层被反复擦拭过的旧玻璃。</text>
  <text x="476" y="374" class="serif">林雾站在钟楼下，终于听见那声并不属于海潮的门铃。她忽然意识到，</text>
  <text x="476" y="414" class="serif">自己追了整整三周的不是一个人，而是一套被刻意重复的时间信号。</text>

  <rect x="462" y="442" width="676" height="76" rx="14" fill="#F2EBDD" stroke="#D8C8AE"/>
  <text x="484" y="474" class="body">当前选区</text>
  <text x="484" y="498" class="small">可续写、改写、补强悬念、沉淀为线索节点</text>
  <rect x="944" y="458" width="84" height="34" rx="14" fill="#486A57"/>
  <text x="972" y="480" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#F7F4EE">续写</text>
  <rect x="1038" y="458" width="84" height="34" rx="14" fill="#EFE5D3"/>
  <text x="1066" y="480" class="small">改写</text>

  <text x="476" y="580" class="serif">钟楼的门没有锁，里面却传来比铁更轻的脚步声。她抬手碰到门环，</text>
  <text x="476" y="620" class="serif">指尖一瞬间冰得像按在某个死人留下的名字上。远处有人喊她的名字，</text>
  <text x="476" y="660" class="serif">可那声音被浪头劈成两半，一半来自街口，一半却像是从钟楼最顶层倒挂下来。</text>

  <rect x="462" y="736" width="676" height="132" rx="18" fill="#FAF6EE" stroke="#D9D0C0"/>
  <text x="486" y="772" class="h2">设计判断</text>
  <text x="486" y="804" class="body">这张图故意展示“对话视图”，用来明确：Lime Novel 不是没有常规 AI 对话框，而是把它放进小说专用右栏里。</text>
  <text x="486" y="834" class="body">同一位置仍可切回“建议视图”，快速浏览结构化结果。</text>

  <rect x="1192" y="100" width="364" height="816" rx="22" fill="#F7F2E8" stroke="#DDD3C3"/>
  <text x="1220" y="140" class="h1">章节代理</text>
  <rect x="1220" y="162" width="84" height="30" rx="15" fill="#DCE8DF"/>
  <text x="1248" y="182" class="small">建议</text>
  <rect x="1314" y="162" width="84" height="30" rx="15" fill="#486A57"/>
  <text x="1342" y="182" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#F7F4EE">对话</text>

  <rect x="1220" y="216" width="308" height="78" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="1240" y="248" class="small">我已读取本章目标、林雾人物卡，以及第 8 章和第 11 章摘要。</text>

  <rect x="1248" y="316" width="280" height="74" rx="18" fill="#EAF1EC" stroke="#B7CCBC"/>
  <text x="1268" y="346" class="small">建议把“门铃”推进到钥匙出现前一秒，保留悬疑，不急着解释。</text>

  <rect x="1220" y="410" width="308" height="136" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="1240" y="444" class="h2">证据卡</text>
  <text x="1240" y="472" class="small">人物卡：林雾明确惧怕钟声。</text>
  <text x="1240" y="498" class="small">第 8 章：她在高处会先摸硬币稳定情绪。</text>
  <text x="1240" y="524" class="small">当前片段：反应偏冷静，建议补身体动作。</text>

  <rect x="1220" y="566" width="308" height="130" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="1240" y="600" class="h2">提议卡</text>
  <text x="1240" y="628" class="small">方案 A：补耳鸣和握拳动作</text>
  <text x="1240" y="654" class="small">方案 B：先写钟楼窗口，再把恐惧延后半拍</text>
  <rect x="1240" y="664" width="96" height="34" rx="14" fill="#486A57"/>
  <text x="1268" y="686" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#F7F4EE">应用方案 A</text>

  <rect x="1220" y="724" width="308" height="30" rx="15" fill="#EDE5D7"/>
  <text x="1240" y="744" class="small">/补强悬念</text>
  <text x="1320" y="744" class="small">/检查视角</text>
  <text x="1400" y="744" class="small">/沉淀设定</text>

  <rect x="1220" y="774" width="308" height="44" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="1240" y="801" class="small">继续追问、改口吻、限制字数，或引用当前选区继续聊……</text>

  <rect x="1220" y="834" width="238" height="40" rx="18" fill="#F7F2E8" stroke="#D9D0C0"/>
  <text x="1242" y="859" class="body">补一版更克制的身体反应</text>
  <rect x="1468" y="834" width="60" height="40" rx="18" fill="#486A57"/>
  <text x="1486" y="859" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#F7F4EE">发送</text>
</svg>
