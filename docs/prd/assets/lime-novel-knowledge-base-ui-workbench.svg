<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgKbWorkbench" x1="0" y1="0" x2="1600" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EFE5"/>
      <stop offset="1" stop-color="#E8DED1"/>
    </linearGradient>
  </defs>
  <style>
    .title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1F1D19; }
    .h1 { font: 700 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1F1D19; }
    .h2 { font: 700 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1F1D19; }
    .body { font: 500 13px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #635C52; }
    .small { font: 500 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7A7368; }
  </style>

  <rect width="1600" height="960" rx="28" fill="url(#bgKbWorkbench)"/>
  <rect x="24" y="24" width="1552" height="912" rx="24" fill="#FBF8F1" stroke="#D9D0C0"/>
  <rect x="24" y="24" width="1552" height="56" rx="24" fill="#F7F2E8"/>
  <text x="56" y="59" class="title">Lime Novel / 知识工作台</text>
  <text x="1042" y="59" class="body">知识页、证据、状态和回写动作必须同屏，不能再拆成几个彼此失联的小页面</text>

  <rect x="44" y="100" width="72" height="816" rx="20" fill="#F2EBDD" stroke="#DDD3C3"/>
  <rect x="56" y="252" width="48" height="48" rx="14" fill="#486A57"/>
  <text x="72" y="282" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="16" font-weight="700" fill="#F7F4EE">知</text>

  <rect x="132" y="100" width="272" height="816" rx="22" fill="#F3ECE0" stroke="#DDD3C3"/>
  <text x="160" y="140" class="h1">范围与目录</text>
  <rect x="160" y="164" width="216" height="42" rx="14" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="182" y="190" class="small">搜索：钟楼钥匙 / 林清远 / 第12章</text>

  <rect x="160" y="232" width="216" height="50" rx="16" fill="#DCE8DF" stroke="#B7CCBC"/>
  <text x="184" y="262" class="body">人物</text>
  <text x="330" y="262" class="small">18</text>
  <rect x="160" y="294" width="216" height="50" rx="16" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="184" y="324" class="body">地点</text>
  <text x="330" y="324" class="small">9</text>
  <rect x="160" y="356" width="216" height="50" rx="16" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="184" y="386" class="body">规则与道具</text>
  <text x="330" y="386" class="small">22</text>
  <rect x="160" y="418" width="216" height="50" rx="16" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="184" y="448" class="body">章节摘要</text>
  <text x="330" y="448" class="small">13</text>
  <rect x="160" y="480" width="216" height="50" rx="16" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="184" y="510" class="body">时间线</text>
  <text x="330" y="510" class="small">31</text>

  <text x="160" y="582" class="h2">最近变更</text>
  <rect x="160" y="598" width="216" height="188" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="182" y="630" class="small">林清远：状态页已更新</text>
  <text x="182" y="658" class="small">钟楼钥匙：候选升格待确认</text>
  <text x="182" y="686" class="small">父亲失踪日期：冲突</text>
  <text x="182" y="714" class="small">第 12 章摘要：已重新编译</text>

  <rect x="428" y="100" width="736" height="816" rx="22" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="460" y="140" class="h1">知识页与证据</text>
  <rect x="460" y="168" width="676" height="48" rx="16" fill="#F7F2E8"/>
  <text x="488" y="198" class="body">知识页</text>
  <text x="576" y="198" class="body">证据</text>
  <text x="650" y="198" class="body">关系</text>
  <text x="724" y="198" class="body">最近变更</text>
  <text x="948" y="198" class="small">对象：林清远</text>

  <rect x="460" y="244" width="676" height="182" rx="22" fill="#FAF6EE" stroke="#D9D0C0"/>
  <text x="486" y="282" class="title" style="font-size:26px;">林清远</text>
  <rect x="634" y="254" width="94" height="28" rx="14" fill="#DCE8DF"/>
  <text x="662" y="273" class="small">accepted</text>
  <rect x="738" y="254" width="94" height="28" rx="14" fill="#F4E6E1"/>
  <text x="766" y="273" class="small">有冲突</text>
  <text x="486" y="318" class="body">调查记者，主线视角人物。当前已知事实聚焦在父亲失踪案、钟楼入口和钥匙指向关系。</text>
  <text x="486" y="350" class="small">当前可信事实：知道旧站台与钥匙有关，但尚未确认钟楼入口和父亲失踪的完整因果。</text>
  <text x="486" y="378" class="small">未决问题：她是否已经意识到“时间裂缝”和父亲失踪是同一条线索？</text>

  <rect x="460" y="454" width="320" height="196" rx="20" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="486" y="490" class="h2">证据片段</text>
  <text x="486" y="520" class="small">第 11 章：第一次确认钥匙与旧站台有关</text>
  <text x="486" y="548" class="small">第 12 章：在门锁前出现主动迟疑和认知断层</text>
  <text x="486" y="576" class="small">人物卡：惧怕高处和钟声，会影响判断节奏</text>

  <rect x="816" y="454" width="320" height="196" rx="20" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="842" y="490" class="h2">关联对象</text>
  <text x="842" y="520" class="small">地点：旧钟楼</text>
  <text x="842" y="548" class="small">道具：钟楼钥匙</text>
  <text x="842" y="576" class="small">人物：沈策 / 父亲</text>

  <rect x="460" y="680" width="676" height="196" rx="20" fill="#FAF6EE" stroke="#D9D0C0"/>
  <text x="486" y="716" class="h2">设计判断</text>
  <text x="486" y="748" class="body">知识工作台不是“卡片库”，而是编译层的前台。核心是页面、证据、状态和回写动作同时可见。</text>
  <text x="486" y="780" class="body">只有这样，作者和代理才能共同维护长期记忆，而不是在一堆孤立摘要中来回跳转。</text>

  <rect x="1192" y="100" width="364" height="816" rx="22" fill="#F7F2E8" stroke="#DDD3C3"/>
  <text x="1220" y="140" class="h1">知识编译代理</text>
  <rect x="1220" y="162" width="84" height="30" rx="15" fill="#486A57"/>
  <text x="1248" y="182" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" font-weight="700" fill="#F7F4EE">建议</text>
  <rect x="1314" y="162" width="84" height="30" rx="15" fill="#DCE8DF"/>
  <text x="1342" y="182" class="small">对话</text>

  <rect x="1220" y="216" width="308" height="120" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="1240" y="250" class="h2">编译摘要</text>
  <text x="1240" y="278" class="small">我刚合并了第 11、12 章关于林清远的认知变化，</text>
  <text x="1240" y="302" class="small">但父亲失踪日期仍有一处冲突待裁决。</text>

  <rect x="1248" y="360" width="280" height="98" rx="18" fill="#EAF1EC" stroke="#B7CCBC"/>
  <text x="1268" y="392" class="small">建议把“她尚未确认钟楼入口”保留为候选结论，</text>
  <text x="1268" y="416" class="small">避免提前把角色认知写死到 canon。</text>

  <rect x="1220" y="482" width="308" height="168" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="1240" y="518" class="h2">建议动作</text>
  <text x="1240" y="546" class="small">/升级为 canon</text>
  <text x="1360" y="546" class="small">/保留候选</text>
  <text x="1240" y="572" class="small">/查看冲突证据</text>
  <text x="1240" y="598" class="small">/生成角色认知报告</text>
  <text x="1240" y="624" class="small">/跳到相关章节</text>

  <rect x="1220" y="680" width="308" height="132" rx="18" fill="#FFFDF8" stroke="#D9D0C0"/>
  <text x="1240" y="716" class="h2">审批提醒</text>
  <text x="1240" y="744" class="small">升级 canon 与批量合并知识页必须显式确认。</text>
  <text x="1240" y="770" class="small">知识库是代理主维护，但不是无边界自动维护。</text>
</svg>
