<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo-lime-192.png" />
    <link rel="apple-touch-icon" href="/logo-lime-192.png" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #f2ebdf 0%, #ece2d1 100%);
      }

      body {
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }

      .boot-splash {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .boot-splash__card {
        width: min(560px, 100%);
        padding: 32px;
        border: 1px solid rgba(214, 204, 185, 0.9);
        border-radius: 28px;
        background: rgba(255, 253, 248, 0.86);
        box-shadow: 0 18px 40px rgba(71, 57, 40, 0.12);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .boot-splash__logo {
        width: 88px;
        height: 88px;
        margin-bottom: 10px;
        border-radius: 50%;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(124, 154, 56, 0.18));
      }

      .boot-splash__eyebrow {
        display: inline-flex;
        align-items: center;
        color: #685f55;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .boot-splash__title {
        margin: 10px 0 12px;
        font-size: 34px;
        line-height: 1.15;
        color: #2f2a24;
      }

      .boot-splash__desc {
        margin: 0;
        color: #685f55;
        line-height: 1.72;
      }

      .boot-splash__slogan {
        margin: 0 0 10px;
        color: #4b6a59;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
    </style>
    <title>Lime Novel</title>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash__card">
          <img class="boot-splash__logo" src="/logo-lime-192.png" alt="Lime Novel 标志" />
          <span class="boot-splash__eyebrow">Lime Novel</span>
          <h1 class="boot-splash__title">正在整理小说工作台...</h1>
          <p class="boot-splash__slogan">青柠一下，灵感即来</p>
          <p class="boot-splash__desc">项目壳、代理侧栏和章节上下文正在接驳。</p>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
