name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag，例如 v0.2.0"
        required: true
        default: "v0.2.0"
      source_ref:
        description: "构建来源，例如 main"
        required: true
        default: "main"
      platform:
        description: "发布平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - mac
          - linux

permissions:
  contents: write

jobs:
  build_windows:
    name: Build Windows
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SOURCE_REF="${GITHUB_REF}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${SOURCE_REF}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Sync package versions
        run: node scripts/sync-version.mjs ${{ steps.meta.outputs.version }}

      - name: Build Windows artifacts
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lime-novel-windows
          path: |
            dist/*
            !dist/builder-debug.yml
            !dist/win-unpacked

  build_macos:
    name: Build macOS
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'mac'
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SOURCE_REF="${GITHUB_REF}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${SOURCE_REF}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Sync package versions
        run: node scripts/sync-version.mjs ${{ steps.meta.outputs.version }}

      - name: Build macOS artifacts
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lime-novel-macos
          path: |
            dist/*
            !dist/builder-debug.yml
            !dist/mac
            !dist/mac-arm64

  build_linux:
    name: Build Linux
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.source_ref || github.ref }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SOURCE_REF="${GITHUB_REF}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${SOURCE_REF}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Sync package versions
        run: node scripts/sync-version.mjs ${{ steps.meta.outputs.version }}

      - name: Build Linux artifacts
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lime-novel-linux
          path: |
            dist/*
            !dist/builder-debug.yml
            !dist/linux-unpacked

  publish_release:
    name: Publish Draft Release
    runs-on: ubuntu-latest
    needs:
      - build_windows
      - build_macos
      - build_linux
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            SOURCE_REF="${{ github.event.inputs.source_ref }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SOURCE_REF="${GITHUB_REF}"
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${SOURCE_REF}" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        if: needs.build_windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: lime-novel-windows
          path: release-assets

      - name: Download macOS artifacts
        if: needs.build_macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: lime-novel-macos
          path: release-assets

      - name: Download Linux artifacts
        if: needs.build_linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: lime-novel-linux
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.source_ref }}
          name: Lime Novel ${{ steps.meta.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          files: release-assets/*
