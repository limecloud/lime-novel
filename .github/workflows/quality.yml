name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Verify local
        run: npm run verify:local

  gui_smoke:
    name: GUI Smoke
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run desktop smoke
        run: npm run verify:gui-smoke

  results:
    name: Quality Results
    runs-on: ubuntu-latest
    needs:
      - frontend
      - gui_smoke
    if: always()

    steps:
      - name: Summarize
        shell: bash
        run: |
          echo "frontend : ${{ needs.frontend.result }}"
          echo "gui_smoke: ${{ needs.gui_smoke.result }}"

          [[ '${{ needs.frontend.result }}' == 'success' ]] || { echo 'frontend failed'; exit 1; }
          [[ '${{ needs.gui_smoke.result }}' == 'success' ]] || { echo 'gui smoke failed'; exit 1; }
